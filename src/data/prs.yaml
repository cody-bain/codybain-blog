# Personal Records (1RMs)
# Used to calculate % 1RM intensity for strength sessions.
# Add a new entry each time you set a new PR — don't overwrite old ones.
# The system finds the most recent PR dated on or before each session.
#
# Fields:
#   lift:   One of the 12 tracked lifts (must match exactly)
#   weight: Numeric weight
#   unit:   lbs or kg
#   date:   YYYY-MM-DD
#
#
# Example:
# - lift: Snatch
#   weight: 225
#   unit: lbs
#   date: 2026-01-15

